---
- name: Install and manage local PingFederate
  hosts: pingfederate
  become: true

  vars:
    pf_user: pingusr
    pf_group: pingusr
    pf_install_root: /opt/ping
    pf_zip_file: /opt/install/pingfederate-12.3.6.zip

  tasks:
    - name: Ensure PingFederate group exists
      ansible.builtin.group:
        name: "{{ pf_group }}"
        state: present

    - name: Check if ping user exists
      ansible.builtin.getent:
        database: passwd
        key: "{{ pf_user }}"
      register: pf_user_check
      failed_when: false

    - name: Ensure PingFederate user exists when missing
      ansible.builtin.user:
        name: "{{ pf_user }}"
        group: "{{ pf_group }}"
        system: true
        shell: /usr/sbin/nologin
        home: "{{ pf_install_root }}"
        create_home: false
      when: pf_user_check.ansible_facts.getent_passwd is not defined


    - name: Ensure install root exists
      ansible.builtin.file:
        path: "{{ pf_install_root }}"
        state: directory
        owner: "{{ pf_user }}"
        group: "{{ pf_group }}"
        mode: "0755"

    - name: Check if PingFederate is already installed
      ansible.builtin.stat:
        path: "{{ pf_install_root }}/pingfederate/bin/run.sh"
      register: pf_installed

    - name: Extract PingFederate zip if not already installed
      ansible.builtin.unarchive:
        src: "{{ pf_zip_file }}"
        dest: "{{ pf_install_root }}"
        remote_src: true
        owner: "{{ pf_user }}"
        group: "{{ pf_group }}"
      when: not pf_installed.stat.exists

    - name: Apply run.properties
      ansible.builtin.template:
        src: templates/run.properties.j2
        dest: "{{ pf_install_root }}/pingfederate/bin/run.properties"
        owner: "{{ pf_user }}"
        group: "{{ pf_group }}"
        mode: "0644"
      notify: Restart PingFederate

    - name: Install systemd service
      ansible.builtin.copy:
        src: files/pingfederate.service
        dest: /etc/systemd/system/pingfederate.service
        owner: root
        group: root
        mode: "0644"
      notify:
        - Reload systemd
        - Restart PingFederate

    - name: Enable and start PingFederate
      ansible.builtin.systemd:
        name: pingfederate
        enabled: true
        state: started
        daemon_reload: true

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Restart PingFederate
      ansible.builtin.systemd:
        name: pingfederate
        state: restarted
